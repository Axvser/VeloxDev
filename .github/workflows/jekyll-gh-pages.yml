name: Deploy Avalonia Browser to GitHub Pages

on:
  push:
    branches: ["master"]
    paths:
      - "Docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.13'

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: | 
              8.0.x
              9.0.x
              10.0.x

      - name: Install workloads
        run: dotnet workload install wasm-tools

      - name: Publish Avalonia Browser
        run: dotnet publish Docs/VeloxDev.Docs.Browser/VeloxDev.Docs.Browser.csproj -c Release -o publish

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
